<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CleanEat Lab — Swipe Experiment</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0c0c14;color:#fff;font-family:'Noto Sans Thai',sans-serif;height:100dvh;overflow:hidden;display:flex;flex-direction:column}
  button{font-family:'Noto Sans Thai',sans-serif;cursor:pointer}
  input{font-family:'Noto Sans Thai',sans-serif}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes cardIn{from{opacity:0;transform:scale(0.88)}to{opacity:1;transform:scale(1)}}
  .fade-in{animation:fadeIn 0.3s ease forwards}
  #app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}
  #header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);flex-shrink:0}
  #body{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
  .screen{flex:1;display:flex;flex-direction:column;overflow:hidden}
  /* scrollable screens */
  .scroll-screen{flex:1;overflow-y:auto;padding:20px 20px 40px;display:flex;flex-direction:column;gap:16px}
  /* card area */
  #swipe-area{flex:1;position:relative}
  .card-wrap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none;touch-action:none}
  .swipe-card{width:100%;max-width:360px;background:linear-gradient(160deg,#1e1e2e 0%,#16161f 100%);border-radius:28px;border:1px solid rgba(255,255,255,0.08);box-shadow:0 32px 80px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.04);overflow:hidden;position:relative;cursor:grab;touch-action:none}
  .swipe-card.grabbing{cursor:grabbing}
  .chip{font-size:10px;color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:6px;padding:4px 7px;line-height:1.4;display:block;margin-bottom:4px}
  .btn-row{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid rgba(255,255,255,0.06)}
  .btn-a{background:rgba(255,107,107,0.08);border:none;border-right:1px solid rgba(255,255,255,0.06);color:#ff6b6b;padding:14px 8px;font-weight:700;font-size:13px;transition:background 0.15s}
  .btn-a:hover{background:rgba(255,107,107,0.18)}
  .btn-b{background:rgba(34,197,94,0.08);border:none;color:#22c55e;padding:14px 8px;font-weight:700;font-size:13px;transition:background 0.15s}
  .btn-b:hover{background:rgba(34,197,94,0.18)}
  .overlay-label{position:absolute;inset:0;z-index:20;border-radius:28px;pointer-events:none;display:flex;align-items:flex-start;padding:20px;opacity:0;transition:opacity 0.1s}
  .overlay-label .badge{padding:6px 14px;border-radius:10px;font-weight:800;font-size:15px}
  /* stat bars */
  .bar-track{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
  .bar-fill{height:100%;border-radius:3px;transition:width 0.8s ease}
  /* mini card stat */
  .mini-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:14px}
  .mini-label{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,0.3);margin-bottom:4px}
  .mini-val{font-size:26px;font-weight:800}
  /* webhook badge */
  .wh-badge{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600}
  .wh-dot{display:inline-block;width:8px;height:8px;border-radius:50%;animation:pulse 1s infinite}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div>
      <span style="font-weight:800;font-size:15px;letter-spacing:-0.5px">Clean<span style="color:#22c55e">Eat</span> Lab</span>
      <span style="font-size:10px;color:rgba(255,255,255,0.3);margin-left:8px;letter-spacing:1px">Swipe Experiment</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div id="round-badge" style="display:none;font-size:12px;color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:4px 12px"></div>
      <button id="stats-btn" onclick="showStats()" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);border-radius:8px;padding:5px 12px;font-size:12px" id="stats-btn">📊 <span id="user-count">0</span> คน</button>
      <button id="clear-btn" onclick="clearData()" style="display:none;background:transparent;border:none;color:rgba(255,107,107,0.5);font-size:11px;padding:5px 8px">🗑</button>
    </div>
  </div>
  <div id="body"></div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const WEBHOOK_URL = "http://localhost:5678/webhook/f0db9d33-9242-4235-bf88-61f19d5e8262";

// ─── DATA ─────────────────────────────────────────────────────────────────────
const CATEGORIES = [
  { id:"seafood",  emoji:"🦐", name:"อาหารทะเล",  color:"#0ea5e9" },
  { id:"grill",    emoji:"🔥", name:"ปิ้งย่าง",    color:"#f97316" },
  { id:"noodle",   emoji:"🍜", name:"ก๋วยเตี๋ยว",  color:"#eab308" },
  { id:"fastfood", emoji:"🍔", name:"ฟาสต์ฟู้ด",  color:"#ec4899" },
  { id:"healthy",  emoji:"🥗", name:"อาหารสุขภาพ", color:"#22c55e" },
];
const PAIRS = {
  seafood:[
    {menu:"ข้าวหน้าปูผัดผงกะหรี่ + ซุปมิโซะ",price:219,a:{name:"ครัวทะเลทิพย์"},b:{name:"ซีฟู้ดคลีน"}},
    {menu:"แซลมอนซาชิมิ 8 ชิ้น + ข้าว",price:299,a:{name:"ซาชิมิอร่อย"},b:{name:"ซูชิคลีน"}},
  ],
  grill:[
    {menu:"หมูย่างชุด 500g + ข้าว + น้ำจิ้ม",price:249,a:{name:"เตาถ่านเด็ด"},b:{name:"กริลคลีน"}},
    {menu:"เนื้อวากิวย่าง 300g + ผักรวม",price:389,a:{name:"มังกรไฟ BBQ"},b:{name:"คลีนกริล BBQ"}},
  ],
  noodle:[
    {menu:"ก๋วยเตี๋ยวเนื้อตุ๋น + ลูกชิ้น",price:65,a:{name:"เจ้าเก่าโบราณ"},b:{name:"โบว์ลคลีน"}},
    {menu:"ต้มยำกุ้งน้ำข้น + ข้าวสวย",price:130,a:{name:"ต้มยำรสเด็ด"},b:{name:"คลีนทอม"}},
  ],
  fastfood:[
    {menu:"เบอร์เกอร์เนื้อคู่ + เฟรนช์ฟรายส์ + น้ำ",price:189,a:{name:"เบอร์เกอร์สตรีท"},b:{name:"คลีนเบอร์เกอร์"}},
    {menu:"พิซซ่าชีส 4 ชนิด ขนาด M",price:259,a:{name:"พิซซ่าฮ็อต"},b:{name:"คลีนพิซซ่า"}},
  ],
  healthy:[
    {menu:"สลัดควินัว + อกไก่ย่าง + น้ำสลัด",price:180,a:{name:"กรีนบาวล์"},b:{name:"คลีนโบว์ล"}},
    {menu:"อะโวคาโดโทสต์ + ไข่ดาว + กาแฟ",price:165,a:{name:"คาเฟ่อบอุ่น"},b:{name:"คาเฟ่คลีน"}},
  ],
};
const A_CHIPS=[
  ["⭐ รสชาติ 4.8/5","🔥 ยอดนิยม 2,300+ ออเดอร์","💬 'อร่อยมาก!' 430 รีวิว"],
  ["⭐ รสชาติ 4.9/5","🏆 อันดับ 1 ในย่าน","💬 'ติดใจมาก!' 610 รีวิว"],
  ["⭐ รสชาติ 4.7/5","🔥 Best Seller สาขา","💬 'มาซ้ำทุกอาทิตย์' 280 รีวิว"],
  ["⭐ รสชาติ 4.8/5","📱 Viral ในโซเชียล","💬 'แนะนำเลย!' 520 รีวิว"],
  ["⭐ รสชาติ 4.6/5","👥 ลูกค้าประจำ 500+","💬 'อร่อยจริงๆ' 190 รีวิว"],
];
const B_CHIPS=[
  ["✅ ความสะอาด 4.9/5 ผู้ใช้จริง","🏥 ผ่านมาตรฐาน อย.","👨‍🍳 ครัวโปร่งใส ดูได้เลย"],
  ["✅ ความสะอาด 5.0/5 รีวิว","🧤 พนักงานสวมถุงมือ","🔍 ตรวจอุณหภูมิทุกจาน"],
  ["✅ ความสะอาด 4.8/5","🧹 ล้างวัตถุดิบมาตรฐาน","📋 รายงานสุขาภิบาลรายเดือน"],
  ["✅ ความสะอาด 4.9/5","🏆 รางวัลร้านสะอาดปี 67","🕐 ทำความสะอาดทุก 2 ชม."],
  ["✅ ความสะอาด 4.7/5 ผู้ใช้จริง","🌿 วัตถุดิบอินทรีย์","♻️ บรรจุภัณฑ์ปลอดภัย"],
];

// ─── STATE ────────────────────────────────────────────────────────────────────
let sessions = [];
let currentSession = null;
let rounds = [];
let roundIdx = 0;
let phase = "intro";

try { sessions = JSON.parse(localStorage.getItem("ce_sessions")||"[]"); } catch{}
function saveSessions(){ try{localStorage.setItem("ce_sessions",JSON.stringify(sessions));}catch{} }

// ─── UTILS ────────────────────────────────────────────────────────────────────
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function generateRounds(){
  const r=[];
  shuffle(CATEGORIES).forEach(cat=>shuffle(PAIRS[cat.id]).forEach(pair=>r.push({cat,pair})));
  return shuffle(r).slice(0,10);
}
function el(id){return document.getElementById(id);}

// ─── WEBHOOK ──────────────────────────────────────────────────────────────────
async function sendToWebhook(data){
  try{
    const res=await fetch(WEBHOOK_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});
    return res.ok;
  }catch(e){console.error("Webhook:",e);return false;}
}
function buildPayload(session){
  const totalB=sessions.reduce((s,x)=>s+x.bCount,0);
  const totalA=sessions.reduce((s,x)=>s+x.aCount,0);
  const total=totalB+totalA;
  const passUsers=sessions.filter(s=>s.pass).length;
  const catData={};
  CATEGORIES.forEach(c=>{catData[c.id]={id:c.id,name:c.name,b:0,total:0};});
  sessions.forEach(s=>s.choices.forEach((ch,i)=>{
    const cid=s.cats[i];
    if(catData[cid]){catData[cid].total++;if(ch==="b")catData[cid].b++;}
  }));
  return{
    event:"session_complete",
    timestamp:new Date().toISOString(),
    currentSession:{name:session.name,bCount:session.bCount,aCount:session.aCount,bPercent:session.pct,pass:session.pass,choices:session.choices,categories:session.cats},
    aggregateStats:{totalUsers:sessions.length,totalSwipes:total,totalBWins:totalB,totalAWins:totalA,overallBWinRate:total>0?Math.round((totalB/total)*100):0,passUsers,failUsers:sessions.length-passUsers,criteriaPass:sessions.length>=6&&passUsers>=6},
    categoryBreakdown:Object.values(catData).filter(c=>c.total>0).map(c=>({category:c.name,categoryId:c.id,bWinRate:Math.round((c.b/c.total)*100),totalSwipes:c.total,bCount:c.b,aCount:c.total-c.b})),
    allSessions:sessions.map(s=>({name:s.name,bCount:s.bCount,aCount:s.aCount,bPercent:s.pct,pass:s.pass})),
  };
}

// ─── RENDER HELPERS ───────────────────────────────────────────────────────────
function updateHeader(){
  el("user-count").textContent=sessions.length;
  el("clear-btn").style.display=sessions.length>0?"":"none";
  el("round-badge").style.display=phase==="swipe"?"":"none";
  if(phase==="swipe") el("round-badge").textContent=`คู่ ${roundIdx+1}/10`;
}

// ─── INTRO SCREEN ─────────────────────────────────────────────────────────────
function showIntro(){
  phase="intro"; updateHeader();
  el("body").innerHTML=`
  <div class="screen fade-in" style="align-items:center;justify-content:center;padding:24px 20px;gap:0;overflow-y:auto">
    <div style="font-size:64px;margin-bottom:16px;text-align:center">🍱</div>
    <div style="font-size:26px;font-weight:800;letter-spacing:-1px;margin-bottom:6px;text-align:center">เลือกร้านที่อยากไป</div>
    <div style="font-size:13px;color:rgba(255,255,255,0.45);text-align:center;max-width:280px;margin-bottom:24px;line-height:1.7">
      แต่ละคู่เมนู + ราคาเหมือนกัน ต่างกันที่จุดเด่น<br>ปัดซ้าย = อร่อย · ปัดขวา = สะอาด
    </div>
    <div style="width:100%;max-width:340px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:16px;margin-bottom:20px">
      ${[["↔","ปัด / คลิกปุ่ม / กด Arrow key"],["🔢","ทดสอบ 10 คู่ สุ่มจาก 5 ประเภทอาหาร"],["📊","สถิติ live อัปเดตทุก swipe"]].map(([icon,txt],i)=>`
      <div style="display:flex;align-items:center;gap:12px;font-size:13px;color:rgba(255,255,255,0.55);padding:6px 0;${i<2?"border-bottom:1px solid rgba(255,255,255,0.05)":""}">
        <span style="font-size:16px;width:24px;text-align:center">${icon}</span>${txt}
      </div>`).join("")}
    </div>
    <div style="display:flex;gap:10px;width:100%;max-width:340px;margin-bottom:12px">
      <input id="name-input" placeholder="ชื่อของคุณ (ไม่บังคับ)" style="flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 14px;color:#fff;font-size:14px;outline:none"/>
      <button onclick="startSession()" style="background:#22c55e;color:#000;border:none;border-radius:12px;padding:12px 20px;font-weight:800;font-size:14px;white-space:nowrap;box-shadow:0 8px 24px rgba(34,197,94,0.3)">เริ่มเลย →</button>
    </div>
    ${sessions.length>0?`<button onclick="showStats()" style="background:transparent;border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.5);border-radius:10px;padding:8px 16px;font-size:12px">📊 ดูสถิติ (${sessions.length} คนเสร็จแล้ว)</button>`:""}
  </div>`;
  const inp=el("name-input");
  if(inp) inp.addEventListener("keydown",e=>{if(e.key==="Enter")startSession();});
}

// ─── START SESSION ────────────────────────────────────────────────────────────
function startSession(){
  const raw=(el("name-input")||{value:""}).value||"";
  const name=raw.trim()||`User ${sessions.length+1}`;
  rounds=generateRounds(); roundIdx=0;
  currentSession={name,choices:[],cats:[],bCount:0,aCount:0};
  phase="swipe"; updateHeader();
  renderSwipe();
}

// ─── SWIPE SCREEN ─────────────────────────────────────────────────────────────
function renderSwipe(){
  updateHeader();
  const {cat,pair}=rounds[roundIdx];
  const chips_a=A_CHIPS[roundIdx%A_CHIPS.length];
  const chips_b=B_CHIPS[roundIdx%B_CHIPS.length];
  const dots=Array.from({length:10},(_,i)=>`<div style="width:${i===roundIdx?20:6}px;height:6px;border-radius:3px;background:${i<roundIdx?"#22c55e":i===roundIdx?cat.color:"rgba(255,255,255,0.12)"};transition:all 0.3s"></div>`).join("");

  el("body").innerHTML=`
  <div id="swipe-area">
    <div class="card-wrap" id="card-wrap">
      <div style="display:flex;gap:6px;margin-bottom:20px;z-index:2">${dots}</div>
      <div style="display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.06);border:1px solid ${cat.color}44;border-radius:30px;padding:6px 16px;margin-bottom:16px;font-size:13px;z-index:2;color:${cat.color};font-weight:600">
        <span style="font-size:18px">${cat.emoji}</span>${cat.name}
      </div>

          <div class="badge" style="background:#ff6b6b;color:#fff;transform:rotate(-12deg);box-shadow:0 4px 20px rgba(255,107,107,0.5)">← อร่อย</div>
        </div>
        <div id="overlay-b" class="overlay-label" style="background:rgba(34,197,94,0.15);justify-content:flex-end">
          <div class="badge" style="background:#22c55e;color:#000;transform:rotate(12deg);box-shadow:0 4px 20px rgba(34,197,94,0.5)">สะอาด →</div>
        </div>
        <div style="height:80px;background:linear-gradient(135deg,${cat.color}22 0%,${cat.color}08 100%);display:flex;align-items:center;justify-content:center;font-size:48px;border-bottom:1px solid rgba(255,255,255,0.05)">${cat.emoji}</div>
        <div style="padding:14px 18px 0">
          <div style="font-size:13px;color:rgba(255,255,255,0.45);margin-bottom:4px">${pair.menu}</div>
          <div style="font-size:22px;font-weight:800;color:#ffd166">฿${pair.price}</div>

          <div style="padding-right:10px;border-right:1px solid rgba(255,255,255,0.06)">
            <div style="display:inline-flex;align-items:center;gap:5px;background:rgba(255,107,107,0.12);color:#ff6b6b;border:1px solid rgba(255,107,107,0.25);border-radius:8px;padding:3px 9px;font-size:10px;font-weight:700;letter-spacing:0.5px;margin-bottom:8px">🍖 ความอร่อย</div>
            <div style="font-size:13px;font-weight:700;margin-bottom:6px;line-height:1.3">${pair.a.name}</div>

          </div>
          <div style="padding-left:10px">
            <div style="display:inline-flex;align-items:center;gap:5px;background:rgba(34,197,94,0.12);color:#22c55e;border:1px solid rgba(34,197,94,0.25);border-radius:8px;padding:3px 9px;font-size:10px;font-weight:700;letter-spacing:0.5px;margin-bottom:8px">🧹 ความสะอาด</div>
            <div style="font-size:13px;font-weight:700;margin-bottom:6px;line-height:1.3">${pair.b.name}</div>
            ${chips_b.map(c=>`<span class="chip">${c}</span>`).join("")}
          </div>
        </div>
        <div class="btn-row" style="margin-top:12px">
          <button class="btn-a" onclick="choose('a')">← เลือกอร่อย</button>
          <button class="btn-b" onclick="choose('b')">เลือกสะอาด →</button>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:16px;margin-top:20px;font-size:11px;color:rgba(255,255,255,0.3);z-index:2">
        <span>← ปัดซ้าย = อร่อย</span>
        <div style="width:1px;height:12px;background:rgba(255,255,255,0.12)"></div>

// ─── DRAG LOGIC ───────────────────────────────────────────────────────────────
function initSwipeDrag(){
  const card=el("swipe-card");
  if(!card)return;
  let startX=null,startY=null,isDrag=false,drag=0,flying=false;
  function setDrag(d){
    drag=Math.max(-1,Math.min(1,d));
    const rotate=drag*18, tx=drag*60;
    card.style.transform=`translateX(${tx}px) rotate(${rotate}deg)`;
    card.style.transition="none";
    const showL=drag<-0.2, showR=drag>0.2;
    const oa=el("overlay-a"), ob=el("overlay-b");
    if(oa) oa.style.opacity=showL?Math.abs(drag)*1.5:0;
    if(ob) ob.style.opacity=showR?Math.abs(drag)*1.5:0;
  }
  function fly(side){
    if(flying)return; flying=true;
    const tx=side==="a"?-200:200;
    card.style.transition="transform 0.38s cubic-bezier(.4,0,.2,1), opacity 0.38s ease";
    card.style.transform=`translateX(${tx}px) translateY(-30px) rotate(${side==="a"?-18:18}deg)`;
    card.style.opacity="0";
    setTimeout(()=>choose(side,true),380);
  }
  // pointer events
  card.addEventListener("pointerdown",e=>{
    if(flying)return;
    startX=e.clientX; startY=e.clientY; isDrag=false;
    card.setPointerCapture(e.pointerId);
    card.classList.add("grabbing");
  });
  card.addEventListener("pointermove",e=>{
    if(startX===null||flying)return;
    const dx=e.clientX-startX, dy=e.clientY-startY;
    if(!isDrag&&(Math.abs(dx)>8||Math.abs(dy)>8)) isDrag=true;
    if(isDrag){setDrag(dx/140);e.preventDefault();}
  });
  card.addEventListener("pointerup",()=>{
    if(startX===null)return;
    card.classList.remove("grabbing");
    if(isDrag&&Math.abs(drag)>0.45){fly(drag<0?"a":"b");}
    else{card.style.transition="transform 0.3s ease";card.style.transform="";drag=0;}
    startX=null;isDrag=false;
  });
  card.addEventListener("pointerleave",()=>{
    if(startX===null)return;
    card.classList.remove("grabbing");
    card.style.transition="transform 0.3s ease";
    card.style.transform=""; drag=0; startX=null; isDrag=false;
  });
  // keyboard
  function onKey(e){if(e.key==="ArrowLeft")fly("a");if(e.key==="ArrowRight")fly("b");}
  window.addEventListener("keydown",onKey);
  card._removeKey=()=>window.removeEventListener("keydown",onKey);
}

// ─── CHOOSE ───────────────────────────────────────────────────────────────────
function choose(side, fromDrag=false){
  // cleanup keyboard listener
  const c=el("swipe-card");
  if(c&&c._removeKey) c._removeKey();

  const {cat}=rounds[roundIdx];
  currentSession.choices.push(side);
  currentSession.cats.push(cat.id);

  if(roundIdx+1>=10){
    // finalise
    const choices=currentSession.choices;
    const bCount=choices.filter(c=>c==="b").length;
    const aCount=10-bCount;
    const pct=bCount*10;
    const pass=bCount>=6;
    const done={...currentSession,bCount,aCount,pct,pass};
    sessions.push(done);
    saveSessions();
    currentSession=done;
    setTimeout(()=>showResult(),fromDrag?20:400);
  } else {
    roundIdx++;
    setTimeout(()=>renderSwipe(),fromDrag?20:420);
  }
}

// ─── RESULT SCREEN ────────────────────────────────────────────────────────────
function showResult(){
  phase="result"; updateHeader();
  const s=currentSession;
  el("body").innerHTML=`
  <div class="screen fade-in" style="align-items:center;justify-content:center;padding:24px;overflow-y:auto">
    <div style="font-size:56px;margin-bottom:12px">${s.pass?"🎉":"😊"}</div>
    <div style="font-size:22px;font-weight:800;text-align:center;margin-bottom:4px">${s.pass?"ความสะอาดชนะ!":"ความอร่อยชนะ!"}</div>
    <div style="font-size:13px;color:rgba(255,255,255,0.45);margin-bottom:20px;text-align:center">${s.name} เลือก B (สะอาด) ${s.bCount}/10 ครั้ง</div>

    <div id="wh-status" class="wh-badge" style="margin-bottom:16px;background:rgba(255,214,102,0.1);border:1px solid rgba(255,214,102,0.3);color:#ffd166">
      <span class="wh-dot" style="background:#ffd166"></span>ส่งข้อมูลไป n8n...
    </div>

    <div style="width:100%;max-width:320px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:18px;overflow:hidden;margin-bottom:16px">
      ${[["🧹 เลือกสะอาด (B)",`${s.bCount} ครั้ง`,"#22c55e"],["🍖 เลือกอร่อย (A)",`${s.aCount} ครั้ง`,"#ff6b6b"],["สัดส่วน B",`${s.pct}%`,"#ffd166"]].map(([lbl,val,col],i)=>`
      <div style="display:flex;justify-content:space-between;padding:14px 18px;${i<2?"border-bottom:1px solid rgba(255,255,255,0.05)":""}font-size:14px">
        <span style="color:rgba(255,255,255,0.5)">${lbl}</span>
        <span style="font-weight:800;color:${col}">${val}</span>
      </div>`).join("")}
    </div>
    <div style="width:100%;max-width:320px;background:${s.pass?"rgba(34,197,94,0.08)":"rgba(255,107,107,0.08)"};border:1px solid ${s.pass?"rgba(34,197,94,0.3)":"rgba(255,107,107,0.3)"};border-radius:12px;padding:12px 16px;font-size:13px;color:${s.pass?"#22c55e":"#ff6b6b"};text-align:center;line-height:1.6;margin-bottom:20px">
      ${s.pass?"✅ ผ่าน criteria — ความสะอาดสำคัญกว่าที่คาดไว้!":"⚠️ ไม่ผ่าน criteria — ความอร่อยยังนำอยู่"}
    </div>
    <div style="display:flex;gap:10px">
      <button onclick="showStats()" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);border-radius:10px;padding:10px 18px;font-size:13px">📊 ดูสถิติ</button>
      <button onclick="showIntro()" style="background:#22c55e;color:#000;border:none;border-radius:10px;padding:10px 20px;font-weight:800;font-size:13px">+ คนถัดไป</button>
    </div>
  </div>`;

  // send webhook
  const payload=buildPayload(s);
  sendToWebhook(payload).then(ok=>{
    const badge=el("wh-status");
    if(!badge)return;
    if(ok){
      badge.style.background="rgba(34,197,94,0.1)";
      badge.style.borderColor="rgba(34,197,94,0.3)";
      badge.style.color="#22c55e";
      badge.innerHTML="✓ ส่งข้อมูลสำเร็จ → n8n webhook";
    } else {
      badge.style.background="rgba(255,107,107,0.1)";
      badge.style.borderColor="rgba(255,107,107,0.3)";
      badge.style.color="#ff6b6b";
      badge.innerHTML="✗ ส่งไม่ได้ — ตรวจสอบ n8n / CORS";
    }
  });
}

// ─── STATS SCREEN ─────────────────────────────────────────────────────────────
function showStats(){
  phase="stats"; updateHeader();
  const totalB=sessions.reduce((s,x)=>s+x.bCount,0);
  const totalA=sessions.reduce((s,x)=>s+x.aCount,0);
  const total=totalB+totalA;
  const pct=total>0?Math.round((totalB/total)*100):null;
  const passUsers=sessions.filter(s=>s.pass).length;
  const criteriaPass=sessions.length>=6&&passUsers>=6;

  const catData={};
  CATEGORIES.forEach(c=>{catData[c.id]={b:0,total:0,...c};});
  sessions.forEach(s=>s.choices.forEach((ch,i)=>{
    const cid=s.cats[i];
    if(catData[cid]){catData[cid].total++;if(ch==="b")catData[cid].b++;}
  }));
  const catEntries=Object.values(catData).filter(c=>c.total>0).sort((a,b)=>(b.b/b.total)-(a.b/a.total));
  const avatars=["😊","😄","🙂","😎","😃","😀","🤩","😁","😆","😊"];

  let catHTML="",perUserHTML="",pivotHTML="";
  if(catEntries.length>0){
    catHTML=`
    <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:16px">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,0.3);margin-bottom:12px">แยกตามประเภทอาหาร</div>
      ${catEntries.map(c=>{
        const p=Math.round((c.b/c.total)*100);
        const col=p>=60?"#22c55e":p>=40?"#ffd166":"#ff6b6b";
        return `<div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
            <span style="color:rgba(255,255,255,0.55)">${c.emoji} ${c.name}</span>
            <span style="font-weight:700;color:${col}">${p}% B</span>
          </div>
          <div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${col}"></div></div>
          <div style="font-size:10px;color:rgba(255,255,255,0.25);margin-top:3px">${c.b}/${c.total} swipes</div>
        </div>`;
      }).join("")}
    </div>`;
  }
  if(sessions.length>0){
    perUserHTML=`
    <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:16px">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,0.3);margin-bottom:12px">รายคน</div>
      ${sessions.map((s,i)=>`
      <div style="display:flex;align-items:center;gap:10px;padding:10px 0;${i<sessions.length-1?"border-bottom:1px solid rgba(255,255,255,0.05)":""}">
        <div style="width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">${avatars[i%avatars.length]}</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600">${s.name}</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.35)">B ${s.bCount}/10 ครั้ง · ${s.pct}%</div>
        </div>
        <div style="font-size:11px;font-weight:700;color:${s.pass?"#22c55e":"#ff6b6b"};background:${s.pass?"rgba(34,197,94,0.1)":"rgba(255,107,107,0.1)"};border:1px solid ${s.pass?"rgba(34,197,94,0.3)":"rgba(255,107,107,0.3)"};border-radius:20px;padding:3px 10px">${s.pass?"✓ ผ่าน":"✗ ไม่ผ่าน"}</div>
      </div>`).join("")}
    </div>`;
  }
  if(sessions.length>=3){
    let msg="",col="";
    if(pct>=60){msg="✅ <strong>B ชนะชัดเจน</strong> — Feature รีวิวความสะอาดมีโอกาสสร้าง differentiation";col="#22c55e";}
    else if(pct>=40){msg="🔄 <strong>ทั้งสองปัจจัยสำคัญพอกัน</strong> — ลองทดสอบการรวม อร่อย + สะอาด ในการ์ดเดียว";col="#ffd166";}
    else{msg="⚠️ <strong>A ชนะขาด</strong> — ผู้บริโภคยังให้รสชาตินำ พิจารณาเพิ่มความสะอาดเป็น secondary";col="#ff6b6b";}
    pivotHTML=`
    <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:16px">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,0.3);margin-bottom:8px">สัญญาณ Pivot</div>
      <div style="font-size:13px;color:${col};line-height:1.7">${msg}</div>
    </div>`;
  }

  el("body").innerHTML=`
  <div class="scroll-screen fade-in">
    <button onclick="showIntro()" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);border-radius:10px;padding:8px 16px;font-size:13px;align-self:flex-start;display:flex;align-items:center;gap:6px">← กลับทดสอบ</button>
    <div style="font-size:20px;font-weight:800;letter-spacing:-0.5px">📊 สถิติ Experiment</div>

    <div style="background:linear-gradient(135deg,#1e1e2e,#16161f);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:20px">
      <div style="font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.35);text-transform:uppercase;margin-bottom:8px">B (สะอาด) ชนะ — ภาพรวม</div>
      <div style="font-size:48px;font-weight:800;color:#22c55e;line-height:1">${pct!==null?pct+"%":"—"}</div>
      <div class="bar-track" style="margin:12px 0 8px"><div class="bar-fill" style="width:${pct??0}%;background:linear-gradient(90deg,#22c55e,#86efac)"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:12px">
        <span style="color:#22c55e;font-weight:700">B: ${totalB} ครั้ง</span>
        <span style="color:#ff6b6b;font-weight:700">A: ${totalA} ครั้ง</span>
      </div>
      <div style="font-size:11px;color:rgba(255,255,255,0.3);margin-top:4px">จาก ${total} swipes ทั้งหมด</div>
    </div>

    <div style="background:${criteriaPass?"rgba(34,197,94,0.08)":sessions.length===0?"rgba(255,255,255,0.04)":"rgba(255,214,102,0.06)"};border:1px solid ${criteriaPass?"rgba(34,197,94,0.3)":sessions.length===0?"rgba(255,255,255,0.1)":"rgba(255,214,102,0.3)"};border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px">
      <div style="font-size:24px">${criteriaPass?"✅":sessions.length===0?"⏳":"🔄"}</div>
      <div>
        <div style="font-weight:700;font-size:14px;margin-bottom:2px;color:${criteriaPass?"#22c55e":sessions.length===0?"rgba(255,255,255,0.6)":"#ffd166"}">${criteriaPass?"ผ่าน Criteria!":sessions.length===0?"รอข้อมูล":"กำลังทดสอบ..."}</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.4);line-height:1.5">${criteriaPass?`${passUsers}/10 คน เลือก B ≥ 6/10 ครั้ง — สมมติฐานถูกต้อง!`:`ต้องการ 6/10 คน ที่เลือก B ≥ 60% — ปัจจุบัน ${passUsers}/${sessions.length} คน`}</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      ${[["Users เสร็จแล้ว",`${sessions.length}/10`,"#fff"],["Swipes ทั้งหมด",total,"#ffd166"],["คนผ่าน Criteria",passUsers,"#22c55e"],["คนไม่ผ่าน",sessions.length-passUsers,"#ff6b6b"]].map(([lbl,val,col])=>`
      <div class="mini-card"><div class="mini-label">${lbl}</div><div class="mini-val" style="color:${col}">${val}</div></div>`).join("")}
    </div>

    ${catHTML}
    ${perUserHTML}
    ${pivotHTML}
  </div>`;
}

// ─── CLEAR ────────────────────────────────────────────────────────────────────
function clearData(){
  if(confirm("ลบข้อมูลทั้งหมด?")){sessions=[];saveSessions();showIntro();}
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
showIntro();
</script>
